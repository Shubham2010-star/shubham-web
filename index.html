<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shubham App & Web Tech</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3b8df2);
background-size:400% 400%;
animation:bgMove 10s infinite;
scroll-behavior:smooth;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
background:#00000080;
padding:15px;
display:flex;
justify-content:space-between;
z-index:100;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

/* HERO */
.hero{
padding:120px 20px;
text-align:center;
}

.hero h1{
font-size:32px;
color:#22c55e;
}

/* SECTION */
.section{
padding:40px 20px;
text-align:center;
}

/* CARDS */
.card{
background:rgba(0,0,0,0.6);
margin:10px;
padding:20px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:rgba(0,0,0,0.8);
}

/* BUTTON */
.btn{
padding:12px 20px;
background:#25D366;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* SOCIAL */
ul{
list-style:none;
display:flex;
justify-content:center;
padding:0;
}

.icon{
margin:10px;
}

.icon a{
text-decoration:none;
color:white;
font-size:18px;
}

/* FOOTER */
footer{
padding:20px;
text-align:center;
}

/* WHATSAPP FLOAT */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div>🚀 Shubham Tech</div>
<div>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</div>
</nav>

<a href="https://wa.me/917488184506" target="_blank">

</a>

<div class="card" onclick="openService('Website Development')">🌐 Website Development</div>
<div class="card" onclick="openService('App Development')">📱 App Development</div>
<div class="card" onclick="openService('AI Tools')">🤖 AI Tools</div>

</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>Contact Us</h2>

<a href="https://wa.me/917488184506" target="_blank">
<button class="btn">Chat on WhatsApp</button>
</a>

</div>

<!-- SOCIAL -->
<div class="section">
<h2>Follow Us</h2>

<li class="icon">
<a href="https://www.instagram.com/shaktiai2.o?igsh=dHBuYXA2dDJ1NmYx" target="_blank">📸 Instagram</a>
</li>

<footer>
© 2026 Shubham App & Web Tech

</body>
</html>
