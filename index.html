<!DOCTYPE html>
<html>
<head>
<title>Shubham App & Web Tech</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;

/* 🔥 Animated Gradient */
background: linear-gradient(270deg, #020617, #0f172a, #020617);
background-size: 600% 600%;
animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* particles */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* Header */
header{
padding:40px;
font-size:32px;
color:#22c55e;
text-shadow:0 0 10px #22c55e;
}

/* Section */
.section{
padding:40px;
}

/* Cards */
.card{
background:rgba(255,255,255,0.08);
margin:15px;
padding:25px;
border-radius:15px;
cursor:pointer;
transition:0.4s;
backdrop-filter: blur(10px);
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px #22c55e;
}

/* Button */
.btn{
padding:14px 25px;
background:#25D366;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px #25D366;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #25D366;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-decoration:none;
box-shadow:0 0 20px #25D366;
}

/* fade animation */
.fade{
animation:fadeIn 1.5s ease;
}
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}
</style>
</head>

<body>

<div id="particles-js"></div>

<header class="fade">
🤖 Shubham App & Web Tech  
<br>
<small>AI Powered Website & App Builder</small>
</header>

<div class="section fade">
<h2>Our Services</h2>

<div class="card">🌐 Website Development</div>
<div class="card">📱 App Development</div>
<div class="card">🤖 AI Tools</div>

</div>

<div class="section fade">
<h2>Contact</h2>

<a href="https://wa.me/917488184506">
<button class="btn">Contact on WhatsApp</button>
</a>

</div>

<a href="https://wa.me/917488184506" class="whatsapp">💬</a>

<script>
particlesJS("particles-js", {
particles: {
number: { value: 60 },
size: { value: 3 },
move: { speed: 2 },
line_linked: { enable: true },
},
});
</script>

</body>
</html>
