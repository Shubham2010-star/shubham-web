<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shubham App & Web Tech</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3b8df2);
  background-size: 400% 400%;
  animation: bgMove 10s infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* LOGIN FORM */
.form {
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:25px;
  background: rgba(0,0,0,0.7);
  border-radius:20px;
  backdrop-filter: blur(15px);
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

#heading{
  text-align:center;
  color:white;
}

.field{
  display:flex;
  align-items:center;
  padding:10px;
  border-radius:10px;
  background:#222;
}

.input-field{
  background:none;
  border:none;
  outline:none;
  color:white;
  width:100%;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#3b8df2;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#0077be;
}

/* SOCIAL ICONS */
ul{
  list-style:none;
  display:flex;
  margin-top:20px;
  padding:0;
}

.icon-content{
  margin:10px;
  position:relative;
}

.icon-content a{
  display:flex;
  justify-content:center;
  align-items:center;
  width:50px;
  height:50px;
  border-radius:50%;
  background:white;
  color:black;
  position:relative;
  overflow:hidden;
}

.filled{
  position:absolute;
  bottom:0;
  width:100%;
  height:0;
  background:black;
  transition:0.3s;
}

.icon-content a:hover .filled{
  height:100%;
}

.icon-content a:hover{
  color:white;
}

.tooltip{
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:5px;
  border-radius:5px;
  opacity:0;
  transition:0.3s;
}

.icon-content:hover .tooltip{
  opacity:1;
}

/* COLORS */
[data-social="instagram"] .filled{background:linear-gradient(45deg,#e1306c,#fd1f1f);}
[data-social="youtube"] .filled{background:red;}

</style>
</head>

<body>

<form class="form">
<h2 id="heading">Login</h2>

<div class="field">
<input class="input-field" placeholder="Username">
</div>

<div class="field">
<input type="password" class="input-field" placeholder="Password">
</div>

<button onclick="login()">Login</button>

</form>

<!-- SOCIAL ICONS -->
<ul>
<li class="icon-content">
<a href="https://instagram.com/shaktiai2.o" data-social="instagram">
<div class="filled"></div>
IG
</a>
<div class="tooltip">Instagram</div>
</li>

<li class="icon-content">
<a href="https://youtube.com" data-social="youtube">
<div class="filled"></div>
YT
</a>
<div class="tooltip">YouTube</div>
</li>
</ul>

<script>
function login(){
  alert("Login system demo working");
}
</script>

</body>
</html>
