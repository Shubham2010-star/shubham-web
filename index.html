<!-- ========================= -->
<!-- AI ASSISTANT CSS START -->
<!-- ========================= -->

<style>

.ai-button{
  position:fixed;
  bottom:110px;
  right:25px;
  width:72px;
  height:72px;
  border-radius:50%;
  background:#00ffff;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 0 25px #00ffff;
  animation:aiPulse 2s infinite;
  transition:0.3s;
}

.ai-button:hover{
  transform:scale(1.1);
}

.ai-button i{
  font-size:34px;
  color:black;
}

@keyframes aiPulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }

}

/* CHAT BOX */

.chat-box{
  position:fixed;
  bottom:200px;
  right:25px;
  width:350px;
  max-width:90%;
  background:#0d1329;
  border-radius:20px;
  overflow:hidden;
  display:none;
  z-index:9999;
  border:1px solid #00ffff;
  box-shadow:0 0 30px rgba(0,255,255,0.3);
}

.chat-header{
  background:#00ffff;
  color:black;
  padding:16px;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-header span{
  cursor:pointer;
  font-size:20px;
}

.chat-body{
  height:320px;
  overflow-y:auto;
  padding:15px;
  background:#050816;
}

.bot-message,
.user-message{
  padding:12px 15px;
  margin-bottom:14px;
  border-radius:15px;
  max-width:85%;
  word-wrap:break-word;
  line-height:1.5;
}

.bot-message{
  background:#111b38;
  color:white;
}

.user-message{
  background:#00ffff;
  color:black;
  margin-left:auto;
}

.chat-input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

.chat-input input{
  flex:1;
  padding:15px;
  border:none;
  outline:none;
  background:#111b38;
  color:white;
  font-size:15px;
}

.chat-input button{
  border:none;
  padding:15px 18px;
  background:#00ffff;
  color:black;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

.chat-input button:hover{
  background:white;
}

</style>

<!-- ========================= -->
<!-- AI ASSISTANT CSS END -->
<!-- ========================= -->



<!-- ========================= -->
<!-- AI ASSISTANT HTML START -->
<!-- ========================= -->

<div class="ai-button" onclick="openChat()">
  <i class="fa-solid fa-robot"></i>
</div>

<div class="chat-box" id="chatBox">

  <div class="chat-header">

    AI Assistant 🚀

    <span onclick="closeChat()">✖</span>

  </div>

  <div class="chat-body" id="chatBody">

    <div class="bot-message">
      Hello Shubham 👋 <br><br>
      I am your AI Assistant. <br>
      Ask me about:
      <br><br>
      • HTML <br>
      • CSS <br>
      • JavaScript <br>
      • Java <br>
      • C++ <br>
      • Projects 🚀
    </div>

  </div>

  <div class="chat-input">

    <input
      type="text"
      id="userInput"
      placeholder="Ask something..."
      onkeypress="handleEnter(event)"
    >

    <button onclick="sendMessage()">
      Send
    </button>

  </div>

</div>

<!-- ========================= -->
<!-- AI ASSISTANT HTML END -->
<!-- ========================= -->



<!-- ========================= -->
<!-- AI ASSISTANT JAVASCRIPT -->
<!-- ========================= -->

<script>

function openChat(){

  document.getElementById("chatBox")
  .style.display = "block";

}

function closeChat(){

  document.getElementById("chatBox")
  .style.display = "none";

}

function handleEnter(event){

  if(event.key === "Enter"){
    sendMessage();
  }

}

function sendMessage(){

  let input =
  document.getElementById("userInput");

  let message = input.value.trim();

  if(message === "") return;

  let chatBody =
  document.getElementById("chatBody");

  // USER MESSAGE

  let userDiv =
  document.createElement("div");

  userDiv.className = "user-message";

  userDiv.innerText = message;

  chatBody.appendChild(userDiv);

  // BOT MESSAGE

  let botDiv =
  document.createElement("div");

  botDiv.className = "bot-message";

  let lower =
  message.toLowerCase();

  let reply =
  "I am learning AI 🚀";

  // REPLIES

  if(lower.includes("hello")
  || lower.includes("hi")){

    reply =
    "Hello Developer 👋";

  }

  else if(lower.includes("html")){

    reply =
    "HTML is used to create website structure.";

  }

  else if(lower.includes("css")){

    reply =
    "CSS makes websites beautiful and responsive.";

  }

  else if(lower.includes("javascript")){

    reply =
    "JavaScript adds interactivity and logic to websites.";

  }

  else if(lower.includes("java")){

    reply =
    "Java is powerful for backend and app development.";

  }

  else if(lower.includes("c++")){

    reply =
    "C++ is fast and powerful for system programming.";

  }

  else if(lower.includes("project")){

    reply =
    "Your futuristic projects are awesome 🚀";

  }

  else if(lower.includes("website")){

    reply =
    "Your portfolio website looks futuristic and professional.";

  }

  else if(lower.includes("ai")){

    reply =
    "AI systems can automate smart tasks and chatbots.";

  }

  else if(lower.includes("bye")){

    reply =
    "Goodbye Developer 👋";

  }

  botDiv.innerText = reply;

  setTimeout(() => {

    chatBody.appendChild(botDiv);

    chatBody.scrollTop =
    chatBody.scrollHeight;

  }, 500);

  input.value = "";

  chatBody.scrollTop =
  chatBody.scrollHeight;

}

</script>
