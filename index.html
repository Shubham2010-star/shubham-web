<!DOCTYPE html>
<html>
<head>
<title>Shakti AI Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  text-align:center;
}

header{
  padding:20px;
  font-size:24px;
  color:#22c55e;
}

.btn{
  padding:14px 25px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  margin:10px;
  font-size:16px;
}

.section{
  padding:30px;
}

.card{
  background:#1e293b;
  margin:10px;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
}

input{
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
}

/* camera */
video{
  width:90%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>🤖 Shakti AI Ultra</header>

<div class="section">
<h2>🚀 Services</h2>

<div class="card" onclick="show('website')">🌐 Website</div>
<div class="card" onclick="show('app')">📱 App</div>
<div class="card" onclick="show('ai')">🤖 AI Tools</div>

<p id="detail"></p>
</div>

<div class="section">
<h2>🤖 AI Chat</h2>

<input id="q" placeholder="Ask anything..."><br><br>

<button class="btn" onclick="askAI()">Ask</button>
<button class="btn" onclick="voice()">🎤 Voice</button>

<p id="ans"></p>
</div>

<div class="section">
<h2>📷 Camera Scan</h2>

<button class="btn" onclick="startCam()">Open Camera</button>
<br>
<video id="cam" autoplay></video>

</div>

<footer>
📞 WhatsApp: 8825208568
</footer>

<script>

// SERVICE
function show(type){
if(type==="website"){
document.getElementById("detail").innerText="Website ₹999 se";
}
else if(type==="app"){
document.getElementById("detail").innerText="Android app banega";
}
else{
document.getElementById("detail").innerText="AI chatbot + tools";
}
}

// AI
async function askAI(){
let q=document.getElementById("q").value.toLowerCase();
document.getElementById("ans").innerText="Thinking...";

try{
let res=await fetch("https://api.affiliateplus.xyz/api/chatbot?message="+q);
let data=await res.json();
document.getElementById("ans").innerText=data.message;
}
catch{
if(q.includes("hello")) document.getElementById("ans").innerText="Hello 👋";
else if(q.includes("price")) document.getElementById("ans").innerText="₹999 start";
else document.getElementById("ans").innerText="WhatsApp karo";
}
}

// VOICE
function voice(){
let recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.onresult=function(e){
let text=e.results[0][0].transcript;
document.getElementById("q").value=text;
askAI();
}
recognition.start();
}

// CAMERA
async function startCam(){
let stream=await navigator.mediaDevices.getUserMedia({video:true});
document.getElementById("cam").srcObject=stream;
}

</script>

</body>
</html>
