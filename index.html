<!DOCTYPE html>
<html>
<head>
<title>Shubham App & Web Tech</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

/* OM background */
.om{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:180px;
color:rgba(255,255,255,0.03);
animation:spin 40s linear infinite;
z-index:0;
}
@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

header{
padding:20px;
font-size:24px;
color:#22c55e;
position:relative;
z-index:2;
}

.section{
padding:40px;
position:relative;
z-index:2;
}

/* cards */
.card{
background:#1e293b;
margin:12px;
padding:20px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
background:#334155;
}

/* detail */
.detail{
display:none;
margin-top:15px;
padding:15px;
background:#020617;
border-radius:10px;
}

/* button */
.btn{
margin-top:10px;
padding:10px 18px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
}

/* whatsapp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
z-index:10;
}
</style>
</head>

<body>

<div class="om">ॐ</div>

<header>🚀 Shubham App & Web Tech</header>

<div class="section">
<h2>Our Services</h2>

<div class="card" onclick="show('web')">🌐 Website</div>
<div id="web" class="detail">
Modern business websites ₹999+<br>
<a href="https://wa.me/917488184506"><button class="btn">Contact</button></a>
</div>

<div class="card" onclick="show('app')">📱 App</div>
<div id="app" class="detail">
Android app development ₹1999+<br>
<a href="https://wa.me/917488184506"><button class="btn">Contact</button></a>
</div>

<div class="card" onclick="show('ai')">🤖 AI Tools</div>
<div id="ai" class="detail">
Chatbot & automation tools<br>
<a href="https://wa.me/917488184506"><button class="btn">Contact</button></a>
</div>

</div>

<div class="section">
<h2>Our Work</h2>

<div class="card">🏨 Hotel Website Demo</div>
<div class="card">🛒 Shop Website Demo</div>
<div class="card">📱 App UI Demo</div>

</div>

<footer>
© 2026 Shubham App & Web Tech
</footer>

<a href="https://wa.me/917488184506" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<script>
function show(id){
let all=document.querySelectorAll('.detail');
all.forEach(x=>x.style.display="none");

let box=document.getElementById(id);
box.style.display="block";

window.scrollTo({top:box.offsetTop-100,behavior:"smooth"});
}
</script>

</body>
</html>
