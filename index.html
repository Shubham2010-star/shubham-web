<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shubham App & Web Tech</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3b8df2);
background-size:400% 400%;
animation:bgMove 10s infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
position:fixed;
top:0;
width:100%;
background:#00000090;
padding:15px;
display:flex;
justify-content:space-between;
z-index:100;
}

.hero{
padding:120px 20px;
text-align:center;
}

.hero h1{
color:#22c55e;
}

.section{
padding:40px 20px;
text-align:center;
}

.card{
background:rgba(0,0,0,0.6);
margin:15px;
padding:25px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:rgba(0,0,0,0.8);
}

.btn{
padding:12px 20px;
background:#25D366;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

/* FORM */
.form{
display:flex;
flex-direction:column;
gap:10px;
max-width:300px;
margin:auto;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

/* FLOAT */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<nav>
<div>🚀 Shubham Tech</div>
</nav>

<div class="hero">
<h1>Build Your Website & App</h1>
<p>Fast • Professional • Affordable</p>
<button class="btn" onclick="orderNow()">Start Project</button>
</div>

<div class="section">
<h2>Our Services</h2>

<div class="card" onclick="sendWhatsApp('Website Development')">🌐 Website Development</div>
<div class="card" onclick="sendWhatsApp('App Development')">📱 App Development</div>
<div class="card" onclick="sendWhatsApp('AI Tools')">🤖 AI Tools</div>

</div>

<!-- CLIENT FORM -->
<div class="section">
<h2>Start Your Project</h2>

<div class="form">
<input id="name" placeholder="Your Name">
<input id="work" placeholder="Project Type">
<button class="btn" onclick="submitForm()">Send Request</button>
</div>

</div>

<div class="section">
<h2>Follow Us</h2>
<a href="https://www.instagram.com/shaktiai2.o?igsh=dHBuYXA2dDJ1NmYx" target="_blank">
<button class="btn">Instagram</button>
</a>
</div>

<a href="https://wa.me/917488184506" class="whatsapp">💬</a>

<script>
function sendWhatsApp(service){
let msg = "Hello, I want " + service;
window.open("https://wa.me/917488184506?text=" + encodeURIComponent(msg));
}

function orderNow(){
let msg = "Hello, I want to start a project";
window.open("https://wa.me/917488184506?text=" + encodeURIComponent(msg));
}

function submitForm(){
let name = document.getElementById("name").value;
let work = document.getElementById("work").value;

let msg = "Name: " + name + " | Project: " + work;
window.open("https://wa.me/917488184506?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
