<!DOCTYPE html>
<html>
<head>
<title>Shubham App & Web Tech</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  text-align:center;
}

/* Header */
header{
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#22c55e;
}

/* Hero */
.hero{
  padding:60px 20px;
}

/* Button */
.btn{
  padding:15px 25px;
  background:linear-gradient(45deg,#22c55e,#4ade80);
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 20px #22c55e;
}

/* Cards */
.section{
  padding:30px;
}
.card{
  background:#1e293b;
  margin:12px;
  padding:20px;
  border-radius:12px;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  background:#334155;
}

/* AI */
input{
  padding:12px;
  width:75%;
  border-radius:10px;
  border:none;
}

/* WhatsApp floating button */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  border-radius:50%;
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 0 15px #25D366;
}
</style>
</head>

<body>

<header>🚀 Shubham App & Web Tech</header>

<div class="hero">
<h1>Premium Website & AI Solutions</h1>
<p>Grow your business with modern tech 💻</p>
</div>

<div class="section">
<h2>Our Services</h2>

<div class="card">🌐 Website Development</div>
<div class="card">📱 App Development</div>
<div class="card">🤖 AI Tools</div>

</div>

<div class="section">
<h2>🤖 Shakti AI</h2>

<input id="q" placeholder="Ask anything..."><br><br>
<button class="btn" onclick="askAI()">Ask</button>

<p id="ans"></p>
</div>

<!-- WhatsApp Floating -->
<a href="https://wa.me/918825208568" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<script>
async function askAI(){
let q=document.getElementById("q").value;

document.getElementById("ans").innerText="Thinking... 🤔";

try{
let res=await fetch("https://api.affiliateplus.xyz/api/chatbot?message="+encodeURIComponent(q));
let data=await res.json();

document.getElementById("ans").innerText=data.message;
}catch{
document.getElementById("ans").innerText="Server busy 😓";
}
}
</script>

</body>
</html>
